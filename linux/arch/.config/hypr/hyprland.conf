source = ~/.config/hypr/mocha.conf
# Monitor
monitor=,preferred,auto,auto

# Autostart
exec-once = hypridle
exec-once = waybar
exec-once = hyprpaper
exec-once = wl-paste --watch cliphist store
exec-once = brightnessctl -d ':white:kbd_backlight' set 2%
# Input
input {
	kb_options = ctrl:nocaps
	repeat_rate = 20
	repeat_delay = 200
	touchpad {
		natural_scroll = true
		tap-to-click = true
	}
	sensitivity = 0.5
}

# General 

general {
	gaps_in = 2
	gaps_out = 3
	border_size = 2
	col.active_border = rgba(cba6f7ff)
	col.inactive_border = rgba(595959aa)
	layout = dwindle

}

# Decoration

decoration {
    rounding = 4

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

# Animations

animations {
	    enabled = true

    bezier = linear, 0.0, 0.0, 1, 1
    #animation = borderangle, 1, 50, linear, loop

    animation=workspaces,1,0.5,default
   # animation=windows,0,0.1,default
   # animation=fade,0,0.1,default
    animation = windows, 1, 0.1, default
    animation = fade,    1, 0.1, default
}

# Dwindle layout

dwindle {
	pseudotile = true
	preserve_split = true
}

# Keybinds
$mod = SUPER

bind = $mod, bracketright, exec, kitty
bind = ALT, L, exec, hyprlock
bind = $mod, B, exec, firefox
bind = $mod, space, exec, rofi -show drun
bind = $mod, V, exec, bash -c "cliphist list | rofi -dmenu | cliphist decode | wl-copy"
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod SHIFT, E, exit

# Screenshot
bind = $mod SHIFT CTRL, 3, exec, hyprshot -m window -o ~/Screenshots
bind = $mod SHIFT CTRL, 4, exec, hyprshot -m region -o ~/Screenshots

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Float и drag мышью
bindm = $mod, mouse:272, movewindow
bindm = ALT, mouse:272, resizewindow

# Move windows
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Workspaces
bind = $mod, period, workspace, +1
bind = $mod, comma, workspace, -1
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

# Move app to workspace
bind = ALT, period, movetoworkspace, +1
bind = ALT, comma, movetoworkspace, -1
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod, grave, movetoworkspace, empty

# Resize submap
bind = $mod, R, submap, resize
submap = resize
binde = , l, resizeactive, 30 0
binde = , h, resizeactive, -30 0
binde = , k, resizeactive, 0 -30
binde = , j, resizeactive, 0 30
bind = , escape, submap, reset
bind = CTRL, bracketleft, submap, reset
submap = reset
# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Keyboard backlight
bind = , XF86KbdBrightnessUp, exec, brightnessctl -d ':white:kbd_backlight' set +1%
bind = , XF86KbdBrightnessDown, exec, brightnessctl -d ':white:kbd_backlight' set 1%-
